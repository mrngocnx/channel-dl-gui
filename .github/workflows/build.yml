name: Build Channel Downloader

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
      - name: Download FFmpeg
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip" -OutFile "ffmpeg.zip"
          Expand-Archive -Path "ffmpeg.zip" -DestinationPath "." -Force
          $dir = Get-ChildItem -Directory "ffmpeg-*" | Select-Object -First 1
          Copy-Item "$($dir.FullName)/bin/ffmpeg.exe" "ffmpeg.exe"
      - name: Build with PyInstaller (onedir)
        run: |
          pyinstaller --onedir --windowed --name "ChannelDL" --add-data "ffmpeg.exe;." --collect-all "customtkinter" --collect-submodules "yt_dlp" --collect-all "yt_dlp" --copy-metadata "yt_dlp" --hidden-import "yt_dlp" --hidden-import "yt_dlp.extractor" --hidden-import "yt_dlp.downloader" --hidden-import "yt_dlp.postprocessor" --hidden-import "certifi" --hidden-import "PIL._tkinter_finder" --collect-all "yt_dlp.extractor" --noconfirm app.py
      - name: Zip folder
        shell: pwsh
        run: |
          Compress-Archive -Path dist/ChannelDL/* -DestinationPath dist/ChannelDL-Windows.zip
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: ChannelDL-Windows
          path: dist/ChannelDL-Windows.zip
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Channel Downloader ${{ github.ref_name }}"
          body: |
            ## 🎬 Channel Downloader GUI v${{ github.ref_name }}

            ### 📥 Tải về:
            - 🪟 **Windows**: `ChannelDL-Windows.zip` — giải nén → chạy `ChannelDL.exe`
            - 🍎 **macOS** / 🐧 **Linux**: cần Python, chạy source: `pip install -r requirements.txt && python app.py`

            ### Hướng dẫn:
            1. Tải file `.zip`
            2. Giải nén vào thư mục bất kỳ
            3. Chạy `ChannelDL.exe`
            4. Dán link kênh → Thám Thính → Xác Nhận Tải Tất Cả
          files: dist/ChannelDL-Windows.zip
          draft: false
