name: Build Channel Downloader

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Get yt-dlp path
        id: ytdlp
        run: echo "path=$(python -c 'import yt_dlp; print(yt_dlp.__path__[0])')" >> $env:GITHUB_OUTPUT

      - name: Get Python path
        id: py
        run: echo "path=$(python -c 'import sys; print(sys.exec_prefix)')" >> $env:GITHUB_OUTPUT

      - name: Build with PyInstaller (onedir)
        run: |
          pyinstaller --onedir --windowed --name "ChannelDL" --add-data "ffmpeg.exe;." --collect-all "customtkinter" --collect-submodules "yt_dlp" --collect-all "yt_dlp" --copy-metadata "yt_dlp" --hidden-import "yt_dlp" --hidden-import "yt_dlp.extractor" --hidden-import "yt_dlp.downloader" --hidden-import "yt_dlp.postprocessor" --hidden-import "certifi" --hidden-import "PIL._tkinter_finder" --collect-all "yt_dlp.extractor" --noconfirm app.py

      - name: Create installer with Inno Setup
        shell: pwsh
        run: |
          # Download Inno Setup portable
          Invoke-WebRequest -Uri "https://jrsoftware.org/download.php/is.exe" -OutFile "$env:TEMP\innosetup.exe"
          Start-Process -Wait -FilePath "$env:TEMP\innosetup.exe" -ArgumentList "/VERYSILENT /SUPPRESSMSGBOXES /NORESTART /DIR=$env:TEMP\is"
          
          # Create setup script
          $script = @"
          [Setup]
          AppName=Channel Downloader
          AppVersion=1.0
          DefaultDirName={autopf}\ChannelDL
          DefaultGroupName=Channel Downloader
          OutputDir=.
          OutputBaseFilename=ChannelDL-Setup-1.0
          Compression=lzma2
          SolidCompression=yes
          UninstallDisplayIcon={app}\ChannelDL.exe
          
          [Languages]
          Name: "vietnamese"; MessagesFile: "compiler:Default.isl"
          
          [Files]
          Source: "dist\ChannelDL\*"; DestDir: "{app}"; Flags: ignoreversion recursesubdirs createallsubdirs
          
          [Icons]
          Name: "{group}\Channel Downloader"; Filename: "{app}\ChannelDL.exe"
          Name: "{group}\Uninstall"; Filename: "{uninstallexe}"
          Name: "{commondesktop}\Channel Downloader"; Filename: "{app}\ChannelDL.exe"
          
          [Run]
          Filename: "{app}\ChannelDL.exe"; Description: "Chạy Channel Downloader"; Flags: postinstall nowait skipifsilent
          "@
          
          Set-Content -Path "$env:TEMP\setup.iss" -Value $script
          
          # Build installer
          & "$env:TEMP\is\ISCC.exe" "$env:TEMP\setup.iss"
          
          # Rename output
          Move-Item -Path "ChannelDL-Setup-1.0.exe" -Destination "dist\ChannelDL-Setup.exe" -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ChannelDL-Windows
          path: dist/ChannelDL-Setup.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install deps
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
          brew install ffmpeg
      - name: Build
        run: pyinstaller --onedir --windowed --name "ChannelDL" --collect-all "customtkinter" --collect-submodules "yt_dlp" --collect-all "yt_dlp" --copy-metadata "yt_dlp" --hidden-import "yt_dlp" --hidden-import "yt_dlp.extractor" --hidden-import "yt_dlp.downloader" --hidden-import "yt_dlp.postprocessor" --hidden-import "certifi" --hidden-import "PIL._tkinter_finder" --collect-all "yt_dlp.extractor" --noconfirm app.py
      - name: Create DMG
        run: |
          brew install create-dmg
          create-dmg --overwrite --dmg-title="ChannelDL" dist/ChannelDL.dmg dist/ChannelDL
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: ChannelDL-macOS
          path: dist/ChannelDL.dmg

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq python3-tk ffmpeg
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
      - name: Build
        run: pyinstaller --onedir --windowed --name "ChannelDL" --collect-all "customtkinter" --collect-submodules "yt_dlp" --collect-all "yt_dlp" --copy-metadata "yt_dlp" --hidden-import "yt_dlp" --hidden-import "yt_dlp.extractor" --hidden-import "yt_dlp.downloader" --hidden-import "yt_dlp.postprocessor" --hidden-import "certifi" --hidden-import "PIL._tkinter_finder" --collect-all "yt_dlp.extractor" --noconfirm app.py
      - name: Create AppImage
        run: |
          wget -q "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage" -O /tmp/appimagetool
          chmod +x /tmp/appimagetool
          mkdir -p dist/ChannelDL.AppDir/usr/bin
          cp -r dist/ChannelDL/* dist/ChannelDL.AppDir/usr/bin/
          /tmp/appimagetool dist/ChannelDL.AppDir
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: ChannelDL-Linux
          path: dist/ChannelDL*.AppImage

  release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Channel Downloader ${{ github.ref_name }}"
          body: |
            ## 🎬 Channel Downloader GUI

            ### 📥 Tải về:
            - 🪟 **Windows**: `ChannelDL-Setup.exe` — chạy file cài đặt, tự động cài app
            - 🍎 **macOS**: `ChannelDL.dmg`
            - 🐧 **Linux**: `ChannelDL.AppImage`

            ### Hướng dẫn:
            - **Windows**: Tải .exe → chạy → Next → Finish → app tự mở
            - **macOS**: Mở .dmg → kéo app vào Applications
            - **Linux**: `chmod +x ChannelDL*.AppImage && ./ChannelDL*.AppImage`
          draft: false
          files: |
            artifacts/ChannelDL-Windows/ChannelDL-Setup.exe
            artifacts/ChannelDL-macOS/ChannelDL.dmg
            artifacts/ChannelDL-Linux/ChannelDL*.AppImage
