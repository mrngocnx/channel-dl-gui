name: Build Channel Downloader

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
      - name: Download FFmpeg
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip" -OutFile "ffmpeg.zip"
          Expand-Archive -Path "ffmpeg.zip" -DestinationPath "." -Force
          $dir = Get-ChildItem -Directory "ffmpeg-*" | Select-Object -First 1
          Copy-Item "$($dir.FullName)/bin/ffmpeg.exe" "ffmpeg.exe"
      - name: Build
        run: |
          pyinstaller --onedir --windowed --name "ChannelDL" --icon "icon.ico" --add-data "ffmpeg.exe;." --add-data "icon.ico;." --collect-all "customtkinter" --collect-submodules "yt_dlp" --collect-all "yt_dlp" --copy-metadata "yt_dlp" --hidden-import "yt_dlp" --hidden-import "yt_dlp.extractor" --hidden-import "yt_dlp.downloader" --hidden-import "yt_dlp.postprocessor" --hidden-import "certifi" --hidden-import "PIL._tkinter_finder" --collect-all "yt_dlp.extractor" --noconfirm app.py
      - name: Zip
        shell: pwsh
        run: Compress-Archive -Path dist/ChannelDL/* -DestinationPath dist/ChannelDL-Windows.zip
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Windows
          path: dist/ChannelDL-Windows.zip

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install deps
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
          brew install ffmpeg
      - name: Build
        run: |
          pyinstaller --onedir --windowed --name "ChannelDL" --icon "icon.ico" --add-data "icon.ico;." --collect-all "customtkinter" --collect-submodules "yt_dlp" --collect-all "yt_dlp" --copy-metadata "yt_dlp" --hidden-import "yt_dlp" --hidden-import "yt_dlp.extractor" --hidden-import "yt_dlp.downloader" --hidden-import "yt_dlp.postprocessor" --hidden-import "certifi" --hidden-import "PIL._tkinter_finder" --collect-all "yt_dlp.extractor" --noconfirm app.py
      - name: Zip
        run: |
          cd dist && zip -r ../ChannelDL-macOS.zip ChannelDL/
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: macOS
          path: ChannelDL-macOS.zip

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq python3-tk ffmpeg
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
      - name: Build
        run: |
          pyinstaller --onedir --windowed --name "ChannelDL" --icon "icon.ico" --add-data "icon.ico;." --collect-all "customtkinter" --collect-submodules "yt_dlp" --collect-all "yt_dlp" --copy-metadata "yt_dlp" --hidden-import "yt_dlp" --hidden-import "yt_dlp.extractor" --hidden-import "yt_dlp.downloader" --hidden-import "yt_dlp.postprocessor" --hidden-import "certifi" --hidden-import "PIL._tkinter_finder" --collect-all "yt_dlp.extractor" --noconfirm app.py
      - name: Zip
        run: |
          cd dist && zip -r ../ChannelDL-Linux.zip ChannelDL/
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Linux
          path: ChannelDL-Linux.zip

  release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Channel Downloader ${{ github.ref_name }}"
          body: |
            ## 🎬 Channel Downloader GUI v${{ github.ref_name }}

            ### 📥 Tải về:
            - 🪟 **Windows**: `ChannelDL-Windows.zip` — giải nén → chạy `ChannelDL.exe`
            - 🍎 **macOS**: `ChannelDL-macOS.zip` — giải nén → chạy `ChannelDL.app`
            - 🐧 **Linux**: `ChannelDL-Linux.zip` — giải nén → chạy `ChannelDL`

            ### Hướng dẫn:
            1. Tải file `.zip` tương ứng
            2. Giải nén
            3. Chạy file chính (Windows: `.exe`, macOS/Linux: không có đuôi)
          files: |
            artifacts/Windows/ChannelDL-Windows.zip
            artifacts/macOS/ChannelDL-macOS.zip
            artifacts/Linux/ChannelDL-Linux.zip
          draft: false
